# ============================================================
# Breaking the Bottleneck — Configuration
# All hyperparameters as reported in the manuscript.
# ============================================================

# ----- Paths ------------------------------------------------
paths:
  raw_tiff_dir:    "data/raw/"          # root directory of per-specimen TIFF stacks
  hdf5_dir:        "data/hdf5/"         # output directory for converted HDF5 files
  mask_dir:        "data/masks/"        # rule-based coarse masks
  simclr_ckpt_dir: "checkpoints/simclr/"
  unet_ckpt_dir:   "checkpoints/unet/"
  mesh_output_dir: "outputs/meshes/"
  log_dir:         "logs/"

# ----- Data partitions (number of specimens) ----------------
partitions:
  simclr_train:      19    # 39,037 images  — SimCLR contrastive pre-training
  simclr_val:         2    # 3,765 images   — SimCLR checkpoint selection
  unet_train:         2    # used with rule-based masks for U-Net training
  unet_test:          1    # held-out internal test specimen (same genus, different individual)
  # Total corpus: 50,626 images across 24 specimens

# ----- Preprocessing ----------------------------------------
preprocessing:
  image_size: [224, 224]   # px — all slices resized to this resolution
  norm_min: 0.0
  norm_max: 1.0
  z_mean: 0.5              # z-standardisation μ
  z_std:  0.5              # z-standardisation σ
  hdf5_chunk_size: [1, 224, 224]
  compression: "gzip"
  compression_opts: 4

# ----- SimCLR v1 Pre-training --------------------------------
simclr:
  encoder: "resnet50"          # ResNet-50 backbone (He et al., 2016)
  feature_dim: 2048            # encoder output dimension
  projection_dim: 128          # projection head output dimension
  projection_hidden_dim: 512   # MLP hidden layer size
  temperature: 0.07            # τ in NT-Xent loss
  epochs: 250
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  num_workers: 8
  seed: 42

  # Domain-specific augmentation pipeline (positive pair generation)
  augmentations:
    random_resized_crop:
      scale: [0.6, 1.0]        # scale jitter enforces scale invariance
    vertical_flip:
      p: 0.5
    horizontal_flip:
      p: 0.2
    random_rotation:
      degrees: 15              # ± 15°
      p: 0.3
    gaussian_blur:
      p: 0.3                   # invariance to high-frequency noise / µCT graininess
    color_jitter:
      brightness: 0.4
      contrast: 0.4
      p_brightness: 0.8
      p_contrast: 0.8

# ----- Rule-Based Masking ------------------------------------
masking:
  # Stage 1: intensity normalisation
  percentile_low: 2
  percentile_high: 98

  # Stage 2: blurring
  gaussian_sigma: 1.5
  median_kernel_size: 3

  # Stage 3: Otsu thresholding + region expansion
  otsu_nbins: 256
  dilation_radius: 3           # outward expansion around Otsu seeds

  # Stage 4: morphological refinement
  tophat_kernel_size: 15
  erosion_iterations: 1
  dilation_iterations: 2

  # Stage 5: connected component filtering
  min_area_mm2: 0.5            # minimum physical area to retain a component
  # Parameters fixed after empirical tuning on training partition.

# ----- U-Net Training ----------------------------------------
unet:
  encoder: "resnet50"          # initialised from SimCLR checkpoint
  encoder_channels: [64, 256, 512, 1024, 2048]   # e1–e4 + bottleneck
  bottleneck_kernel_size: 7    # 7×7 conv in bottleneck
  decoder_channels: [256, 128, 64, 32]

  # Loss: composite Weighted Cross-Entropy + Dice
  loss:
    wce_weight: 0.5
    dice_weight: 0.5
    class_weights: [0.1, 0.9]  # [background, bone] — severe class imbalance

  epochs: 500
  batch_size: 8
  learning_rate: 1.0e-3        # OneCycleLR max_lr
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "one_cycle_lr"
  num_workers: 4
  early_stopping_patience: 50
  checkpoint_metric: "dice"    # save on best validation Dice

# ----- 3D Mesh Generation ------------------------------------
mesh:
  iso_level: 0.5               # marching cubes iso-surface threshold
  step_size: 1                 # marching cubes step size (voxels)
  region_grow_threshold: 0.4   # high-confidence bone voxel seed threshold
  min_fragment_voxels: 50      # morphological cleanup: drop fragments below this
  closing_radius: 2            # morphological closing radius

# ----- Evaluation --------------------------------------------
evaluation:
  # Grad-CAM
  grad_cam_target_layer: "layer4"   # ResNet-50 final conv block

  # UMAP
  umap_n_neighbours: 15
  umap_min_dist: 0.1
  umap_n_components: 2
  umap_metric: "cosine"

  # CloudCompare registration (geometric comparison)
  icp_max_iterations: 100
  icp_convergence_threshold: 1.0e-6
  icp_overlap_default: 1.0    # 100% — all points used
  icp_overlap_trimmed: 0.80   # 80%  — for specimens with non-overlapping peripheral geometry
